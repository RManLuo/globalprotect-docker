services:
  globalprotect:
    # Subnet routing needs forwarding in the shared network namespace.
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1

  tailscale:
    image: tailscale/tailscale:latest
    network_mode: "service:globalprotect"
    depends_on:
      - globalprotect
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:?set TS_AUTHKEY to a Tailscale auth key or OAuth client secret}
      - TS_AUTH_ONCE=true
      - TS_ACCEPT_DNS=false
      - TS_HOSTNAME=${TS_HOSTNAME:-globalprotect-vpn}
      - TS_ROUTES=${TS_ROUTES:?set TS_ROUTES to the VPN CIDRs to advertise, for example 10.0.0.0/8}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ./.tailscale-state:/var/lib/tailscale
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
