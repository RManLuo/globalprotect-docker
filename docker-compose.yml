services:
  globalprotect:
    image: ghcr.io/rmanluo/globalprotect-docker:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    hostname: globalprotect
    restart: unless-stopped
    tty: true
    volumes:
      - ./config/com.yuezk.qt:/root/.config/com.yuezk.qt
      - ./config/gp.conf:/etc/gpservice/gp.conf
      - ./config/hipreport.sh:/root/hipreport.sh
    devices:
      - /dev/net/tun
      - /dev/vhost-net
    cap_add:
      - NET_ADMIN
    ports:
      - 127.0.0.1:8083:8083
      - 127.0.0.1:10081:1080
    networks:
      - globalprotect
    environment:
      - QTWEBENGINE_CHROMIUM_FLAGS=--no-sandbox
      - APP_VERSION=6.3.3-638
      # Enable clipboard and mobile keyboard support
      - NOVNC_ENABLE_CLIPBOARD=1
      - NOVNC_MOBILE_KEYBOARD=1
      # Optional: set in a local override to pre-fill the portal on first run.
      # - GPAGENT_PORTAL=<vpn-portal-host>
      # Uncomment and configure these for unattended 1Password-based reconnects.
      # - GPAGENT_AUTO_RECONNECT=1
      # - GPAGENT_OP_ITEM=GlobalProtect
      # - GPAGENT_OP_VAULT=Private
      # - OP_SERVICE_ACCOUNT_TOKEN_FILE=/run/secrets/op_service_account_token
      # - GPAGENT_LOGIN_USERNAME_SELECTOR=#username
      # - GPAGENT_LOGIN_PASSWORD_SELECTOR=#password
      # - GPAGENT_LOGIN_TOTP_SELECTOR=#totp
      # - GPAGENT_LOGIN_SUBMIT_SELECTOR=button[type=submit]
      # - GPAGENT_SAML_THROTTLE_SLEEP_SECONDS=300
    # secrets:
    #   - op_service_account_token
 
networks:
  globalprotect:
    external: false
    name: globalprotect

